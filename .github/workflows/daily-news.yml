name: Daily News Generator

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 06:00 sáng VN
  workflow_dispatch:       # cho phép chạy thủ công từ GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # cần để push file lên repo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests edge-tts python-dotenv

      - name: Run news generator
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}   # nếu cần API key
        run: |
          python generate_news.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_today.json audio.mp3
          git commit -m "Daily news update $(date +'%Y-%m-%d')" || echo "No changes"
          git push
